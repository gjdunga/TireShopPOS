<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Page Not Found | TireShopPOS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#F4F0E8;font-family:'Oswald','Arial Narrow',sans-serif;color:#1A2744}
.card{background:#fff;border-radius:12px;box-shadow:0 4px 24px rgba(26,39,68,0.1);padding:3rem 2.5rem;max-width:440px;width:90%;text-align:center}
.code{font-size:5rem;font-weight:600;color:#C9202F;line-height:1;letter-spacing:-0.03em}
.divider{width:48px;height:3px;background:#C9202F;margin:1rem auto;border-radius:2px}
h1{font-size:1.25rem;font-weight:600;margin-bottom:0.75rem;letter-spacing:0.02em}
p{font-family:Georgia,'Times New Roman',serif;font-size:0.9375rem;color:#6B6560;line-height:1.6;margin-bottom:1.25rem}
a{display:inline-block;padding:0.6rem 1.75rem;background:#1A2744;color:#F4F0E8;text-decoration:none;border-radius:6px;font-family:'Oswald',sans-serif;font-size:0.875rem;letter-spacing:0.04em;transition:background 0.2s}
a:hover{background:#C9202F}
.footer{margin-top:1.5rem;font-size:0.75rem;color:#999;font-family:Georgia,serif}
</style>
</head>
<body>
<div class="card">
  <div class="code">404</div>
  <div class="divider"></div>
  <h1>PAGE NOT FOUND</h1>

</div>
