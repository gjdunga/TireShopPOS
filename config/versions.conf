# ============================================================================
# TireShopPOS: Supported Versions
# ============================================================================
#
# This file defines the tested/supported versions for all dependencies.
# The installer (scripts/install.sh) reads these values for dep checks.
# Update this file when upgrading to a new platform version.
#
# Target platform: Ubuntu 24.04 LTS + Virtualmin 8.x Professional
#
# DunganSoft Technologies, March 2026
# ============================================================================

# PHP: Virtualmin 8.x on Ubuntu 24.04 installs PHP 8.3 via FPM
# Minimum supported; maximum tested. Reject anything outside this range.
PHP_MIN="8.1.0"
PHP_MAX="8.4.99"
PHP_RECOMMENDED="8.3"

# PHP extensions required (space-separated)
PHP_EXTENSIONS="mysqli pdo_mysql bcmath curl mbstring json"

# MariaDB: Ubuntu 24.04 default is 10.11; LTS support until Feb 2028
MARIADB_MIN="10.11.0"
MARIADB_MAX="11.99.99"
MARIADB_RECOMMENDED="10.11"

# MySQL: alternative to MariaDB; Ubuntu 24.04 ships 8.0.36+
MYSQL_MIN="8.0.30"
MYSQL_MAX="8.4.99"
MYSQL_RECOMMENDED="8.0"

# Node.js: Jod LTS (22.x) for frontend builds
# Not required at runtime, only for building the React frontend.
NODE_MIN="22.0.0"
NODE_MAX="24.99.99"
NODE_RECOMMENDED="22"

# npm: ships bundled with Node.js 22
NPM_MIN="10.0.0"
NPM_MAX="11.99.99"

# Vite: locked in package.json
VITE_VERSION="7"

# React: locked in package.json
REACT_VERSION="19"

# Apache: Virtualmin manages this; Ubuntu 24.04 ships 2.4.58+
APACHE_MIN="2.4.0"

# OS: Ubuntu 24.04 LTS (Noble Numbat)
OS_CODENAME="noble"
OS_VERSION="24.04"
